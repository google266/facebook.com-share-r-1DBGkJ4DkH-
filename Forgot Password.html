<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find Your Account</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body{
    background:#f0f2f5;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

.container{
    width:100%;
    max-width:600px;
    margin:70px auto;
    padding:20px;
}

.back-btn{
    font-size:35px;
    color:#65676b;
    cursor:pointer;
    margin-bottom:25px;
}

h1{
    font-size:42px;
    color:#1c1e21;
    margin-bottom:10px;
}

.subtitle{
    font-size:22px;
    color:#1c1e21;
    margin-bottom:30px;
}

input{
    width:100%;
    height:65px;
    border:1px solid #ccd0d5;
    border-radius:18px;
    padding:0 18px;
    font-size:20px;
    outline:none;
    background:#fff;
}

input:focus{
    border-color:#1877f2;
}

button{
    width:100%;
    height:65px;
    border:none;
    border-radius:35px;
    background:#1877f2;
    color:#fff;
    font-size:24px;
    font-weight:bold;
    margin-top:30px;
    cursor:pointer;
}

button:hover{
    background:#166fe5;
}

.footer{
    margin-top:auto;
    padding:30px 20px;
    text-align:center;
    color:#65676b;
    font-size:15px;
}

.languages{
    margin-bottom:25px;
}

.languages a,
.links a{
    text-decoration:none;
    color:#65676b;
    margin:0 8px;
    line-height:35px;
}

hr{
    margin:20px 0;
    border:none;
    border-top:1px solid #ddd;
}
</style>
</head>
<body>

<div class="container">

    <div class="back-btn">&#8249;</div>

    <h1>Find Your Account</h1>

    <p class="subtitle">
        Enter your mobile number or email address.
    </p>

    <input type="text"
    placeholder="Mobile number or email address">

    <button>Continue</button>

</div>

<div class="footer">

    <div class="languages">
        <a href="#">English (UK)</a>
        <a href="#">සිංහල</a>
        <a href="#">தமிழ்</a>
        <a href="#">Español</a>
        <a href="#">Deutsch</a>
        <a href="#">Italiano</a>
        <a href="#">Français</a>
    </div>

    <hr>

    <div class="links">
        <a href="#">Sign up</a>
        <a href="#">Log in</a>
        <a href="#">Messenger</a>
        <a href="#">Facebook Lite</a>
        <a href="#">Video</a>
        <a href="#">Meta Pay</a>
        <a href="#">Meta Store</a>
        <a href="#">Instagram</a>
        <a href="#">Privacy Policy</a>
        <a href="#">Terms</a>
        <a href="#">Help</a>
    </div>

    <br>
    Meta © 2026

</div>

</body>
</html>
